<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Bionordis - Lab System</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; max-width: 1000px; margin: 0 auto; padding: 20px; background-color: #f4f7f6; }
        .container { display: grid; grid-template-columns: 400px 1fr; gap: 20px; }
        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        
        h3 { color: #2c3e50; margin-top: 0; border-bottom: 2px solid #eee; padding-bottom: 10px; }
        input, textarea { width: 100%; padding: 10px; margin-bottom: 8px; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
        
        .label-opt { font-size: 0.8em; color: #999; float: right; font-weight: normal; }
        
        button { width: 100%; padding: 12px; background-color: #27ae60; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; margin-top: 10px; }
        button:hover { background-color: #219150; }

        /* LISTA INTELIGENTE */
        details { background: #fff; border: 1px solid #eee; border-radius: 8px; margin-bottom: 10px; overflow: hidden; }
        summary { display: flex; align-items: center; padding: 10px; cursor: pointer; }
        
        /* Ícone da lista: Muda se for Química ou Planta */
        .thumb-box { 
            width: 60px; height: 60px; margin-right: 15px; border-radius: 4px; 
            display: flex; align-items: center; justify-content: center;
            background: #f0f2f5; font-size: 2em; border: 1px solid #eee;
        }
        .thumb-img { width: 100%; height: 100%; object-fit: contain; }

        .detalhes-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; padding: 15px; background: #f8f9fa; border-top: 1px solid #eee; font-size: 0.9em; }
        
        .btn-delete { background: #e74c3c; width: auto; float: right; padding: 5px 10px; font-size: 0.8em; }
        
        .badge-tipo { padding: 2px 6px; border-radius: 4px; font-size: 0.7em; text-transform: uppercase; font-weight: bold; }
        .tipo-bio { background: #e8f5e9; color: #2e7d32; } /* Verde */
        .tipo-quim { background: #e3f2fd; color: #1565c0; } /* Azul */
    </style>
</head>
<body>

<h1 style="text-align: center;">🌵 Bionordis <small style="font-size:0.5em; font-weight:normal">Gestão Laboratorial</small></h1>

<div class="container">
    
    <div class="card">
        <h3>📝 Novo Registro</h3>
        
        <label><b>Nome da Amostra/Composto</b></label>
        <input type="text" id="nome" placeholder="Ex: Extrato de Jurema ou Cafeína">

        <label><b>Estrutura Química</b> <span class="label-opt">(Opcional)</span></label>
        <input type="text" id="smiles" placeholder="Código SMILES (Deixe vazio se for apenas amostra biológica)">

        <label><b>Dados da Amostra</b></label>
        <input type="text" id="especie" placeholder="Nome Científico (Espécie)">
        <input type="text" id="familia" placeholder="Família">
        <input type="text" id="bioma" placeholder="Bioma">
        <input type="text" id="parte" placeholder="Parte da Planta">

        <label><b>Referências</b></label>
        <input type="text" id="instituicao" placeholder="Instituição Parceira">
        <input type="text" id="doi" placeholder="Link DOI / Artigo">

        <button onclick="salvar()">💾 Salvar Registro</button>
    </div>

    <div class="card">
        <div style="display:flex; justify-content:space-between; align-items:center;">
            <h3 style="margin:0; border:none;">Acervo</h3>
            <button onclick="carregarLista()" style="width:auto; padding: 5px 15px;">🔄</button>
        </div>
        <div id="listaMoleculas" style="margin-top:15px;">Carregando...</div>
    </div>
</div>

<script>
    async function salvar() {
        const dados = {
            nome: document.getElementById('nome').value,
            smiles: document.getElementById('smiles').value,
            nome_cientifico: document.getElementById('especie').value,
            familia: document.getElementById('familia').value,
            bioma: document.getElementById('bioma').value,
            parte_planta: document.getElementById('parte').value,
            instituicao: document.getElementById('instituicao').value,
            doi_link1: document.getElementById('doi').value
        };

        if(!dados.nome) { alert("O Nome é obrigatório!"); return; }

        const res = await fetch('/salvar', {
            method: 'POST', headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(dados)
        });

        if(res.ok) {
            carregarLista();
            document.getElementById('nome').value = "";
            document.getElementById('smiles').value = ""; // Limpa principais
        } else {
            const err = await res.json();
            alert("Erro: " + err.erro);
        }
    }

    async function carregarLista() {
        const res = await fetch('/listar');
        const lista = await res.json();
        const div = document.getElementById('listaMoleculas');
        div.innerHTML = "";

        if (lista.length === 0) div.innerHTML = "<p>Nenhum registro.</p>";

        lista.forEach(m => {
            // LÓGICA DE EXIBIÇÃO: QUÍMICA vs BIOLOGIA
            let iconeHtml = '';
            let dadosExtras = '';
            let badge = '';

            if (m.smiles) {
                // É QUÍMICA
                iconeHtml = `<img src="/imagem/${encodeURIComponent(m.smiles)}" class="thumb-img">`;
                badge = `<span class="badge-tipo tipo-quim">Isolado Químico</span>`;
                dadosExtras = `
                    <strong>⚖️ Dados Físico-Químicos:</strong><br>
                    Peso: ${m.peso} g/mol <br> LogP: ${m.logp}
                `;
            } else {
                // É BIOLOGIA (Sem estrutura)
                iconeHtml = `🌿`; // Emoji de planta
                badge = `<span class="badge-tipo tipo-bio">Amostra Biológica</span>`;
                dadosExtras = `
                    <strong>📄 Bibliografia & Origem:</strong><br>
                    Instituição: ${m.instituicao || '-'}<br>
                    DOI: <a href="${m.doi_link1}" target="_blank">Link do Artigo</a>
                `;
            }

            div.innerHTML += `
                <details>
                    <summary>
                        <div class="thumb-box">${iconeHtml}</div>
                        <div style="flex:1">
                            <div style="font-weight:bold; font-size:1.1em">${m.nome}</div>
                            <div style="font-size:0.9em; color:#555;">
                                ${m.nome_cientifico || 'Espécie não informada'}
                            </div>
                            ${badge}
                        </div>
                    </summary>
                    <div class="detalhes-grid">
                        <div>
                            <strong>🌿 Dados Botânicos:</strong><br>
                            Família: ${m.familia || '-'}<br>
                            Bioma: ${m.bioma || '-'}<br>
                            Parte: ${m.parte_planta || '-'}
                        </div>
                        <div>
                            ${dadosExtras}
                        </div>
                        <div style="grid-column: 1 / -1; padding-top:10px; border-top:1px solid #eee;">
                            <button class="btn-delete" onclick="deletar(${m.id})">🗑️ Excluir Registro</button>
                        </div>
                    </div>
                </details>
            `;
        });
    }
    
    async function deletar(id) {
        if(confirm("Apagar registro?")) {
            await fetch(`/deletar/${id}`, { method:'DELETE' });
            carregarLista();
        }
    }

    carregarLista();
</script>

</body>
</html>
